  <title id="logo-title">Agentic Pacific icon, dark mode</title>
  <desc id="logo-desc">Icon-only mark for Agentic Pacific featuring a Pacific-centered globe with Fiji and surrounding island outlines and AI network pathways.</desc>

  <defs>
